<!DOCTYPE html>
<html>
<head>
    <title>EventHub</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <header>
        <h1>EventHub</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Events</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Discover Amazing Events</h2>
            <p>Explore music, tech, and more</p>
        </section>

        <section>
            <h2>Upcoming Events</h2>

            <div class="card-container">

                <div class="card">
                    <img src="images/concert.jpg" alt="Music Concert">
                    <h3>Music Concert</h3>
                    <p>Enjoy live music experience</p>
                </div>

                <div class="card">
                    <img src="images/techtalk.jpg" alt="Tech Talk">
                    <h3>Tech Talk</h3>
                    <p>Learn about latest technologies</p>
                </div>

                <div class="card">
                    <img src="images/workshop.jpg" alt="Workshop">
                    <h3>Workshop</h3>
                    <p>Hands-on learning sessions</p>
                </div>

            </div>
        </section>

        <section>
            <h2>About Us</h2>
            <p>EventHub helps users discover events easily</p>
        </section>
    </main>

    <footer>
        <p>© 2026 EventHub</p>
    </footer>

</body>
</html>
