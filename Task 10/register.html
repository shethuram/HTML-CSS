<!DOCTYPE html>
<html>
<head>
    <title>Register - EventHub</title>
    <link rel="stylesheet" href="register.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header>

    <img src="assets/images/logo.jpg" class="logo">

    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-icon">☰</label>

    <nav>
        <ul class="nav-links">
            <li><a href="index.html#page-home">Home</a></li>

            <li class="dropdown">
                <a>Events</a>
                <ul class="dropdown-menu">
                    <li><a href="index.html#page-categories">Browse All</a></li>
                    <li><a href="index.html#page-sidebar">What's New</a></li>
                    <li><a href="index.html#page-highlights">Gallery</a></li>
                    <li><a href="index.html#page-faqs">FAQs</a></li>
                </ul>
            </li>

            <li><a href="index.html#page-about">About</a></li>
        </ul>
    </nav>

</header>

<main>

<section class="register-section">
    <div class="form-box">
        <h2>Create Your Account</h2>

        <form onsubmit="alert('Registered Successfully!')">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="number" placeholder="Age" required>

            <button type="submit">Register</button>
        </form>
    </div>
</section>

</main>

<footer>
    <p>© 2026 EventHub</p>
</footer>

</body>
</html>
