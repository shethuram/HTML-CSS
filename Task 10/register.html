<!DOCTYPE html>
<html>
<head>
    <title>Register - EventHub</title>
    <link rel="stylesheet" href="register.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header>
    <h1>EventHub</h1>
    <nav>
        <ul class="nav-links">
            <li><a href="index.html#page-home">Home</a></li>
            <li><a href="index.html#page-categories">Events</a></li>
            <li><a href="index.html#page-about">About</a></li>
        </ul>
    </nav>
</header>

<main>

<section class="register-section">
    <div class="form-box">
        <h2>Create Your Account</h2>

        <form onsubmit="alert('Registered Successfully!')">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="number" placeholder="Age" required>

            <button type="submit">Register</button>
        </form>
    </div>
</section>

</main>

<footer>
    <p>© 2026 EventHub</p>
</footer>

</body>
</html>
